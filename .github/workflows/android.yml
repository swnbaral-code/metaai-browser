name: Build Android APK from ZIP
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Unzip the project
        run: unzip -o metaai-hyper-browser-os.zip -d extracted_files

      - name: Find package.json and set up directory
        run: |
          TARGET_DIR=$(find extracted_files -name "package.json" -printf '%h\n' | head -n 1)
          echo "PROJECT_PATH=$TARGET_DIR" >> $GITHUB_ENV

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd ${{ env.PROJECT_PATH }}
          npm install --force
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Assets
        run: |
          cd ${{ env.PROJECT_PATH }}
          npm run build

      - name: Capacitor Sync
        run: |
          cd ${{ env.PROJECT_PATH }}
          npx cap init "MetaAI Browser" "com.metaai.browser" --web-dir dist --confirm
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd ${{ env.PROJECT_PATH }}/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: MetaAI-Browser-APK
          path: ${{ env.PROJECT_PATH }}/android/app/build/outputs/apk/debug/app-debug.apk
          
